<!DOCTYPE html>
<html lang="en">
<head>
  <title>WiFi Loader Animation</title>
  <style>
    #wifi-loader {
      --background: #62ABFF;
      --front-color: #4F29F0; 
      --back-color: #C3C8DE;
      --text-color: #414856; 
      width: 64px;
      height: 64px;
      border-radius: 50px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #wifi-loader svg {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #wifi-loader circle {
      position: absolute;
      fill: none;
      stroke-width: 6px;
      stroke-linecap: round;
      stroke-linejoin: round;
      transform: rotate(-100deg);
      transform-origin: center;
    }

    #wifi-loader .back {
      stroke: var(--back-color);
    }

    #wifi-loader .front {
      stroke: var(--front-color);
    }

    .circle-outer {
      height: 86px;
      width: 86px;
    }

    .circle-outer circle {
      stroke-dasharray: 62.75 188.25;
    }

    .circle-outer .back {
      animation: circle-outer 1.8s ease infinite 0.3s;
    }

    .circle-outer .front {
      animation: circle-outer 1.8s ease infinite 0.15s;
    }

    .circle-middle {
      height: 60px;
      width: 60px;
    }

    .circle-middle circle {
      stroke-dasharray: 42.5 127.5;
    }

    .circle-middle .back {
      animation: circle-middle 1.8s ease infinite 0.25s;
    }

    .circle-middle .front {
      animation: circle-middle 1.8s ease infinite 0.1s;
    }

    @keyframes circle-outer {
      0% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 62.75; }
      100% { stroke-dashoffset: 125.5; }
    }

    @keyframes circle-middle {
      0% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 42.5; }
      100% { stroke-dashoffset: 85; }
    }
  </style>
</head>
<body>

  <div id="wifi-loader">
    <svg class="circle-outer" viewBox="0 0 86 86">
      <circle class="back" cx="43" cy="43" r="40"></circle>
      <circle class="front" cx="43" cy="43" r="40"></circle>
      <circle class="new" cx="43" cy="43" r="40"></circle>
    </svg>
    <svg class="circle-middle" viewBox="0 0 60 60">
      <circle class="back" cx="30" cy="30" r="27"></circle>
      <circle class="front" cx="30" cy="30" r="27"></circle>
    </svg>
    <svg class="circle-inner" viewBox="0 0 34 34">
      <circle class="back" cx="17" cy="17" r="14"></circle>
      <circle class="front" cx="17" cy="17" r="14"></circle>
    </svg>
    <div class="text" data-text="Searching"></div>
  </div>
  
  
  

</body>
